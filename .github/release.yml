changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug fixes"
      labels:
        - fix
        - bug
    - title: "📚 Documentation"
      labels:
        - docs
        - documentation
    - title: "🧪 Tests"
      labels:
        - test
        - tests
    - title: "🏗 Internal"
      labels:
        - chore
        - refactor
        - internal
    - title: "📦 Dependencies"
      labels:
        - dependencies
        - deps
    - title: "Other changes"
      labels:
        - "*"
