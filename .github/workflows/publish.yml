name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to publish'
        required: false
        default: 'main'

# Required for npm Trusted Publisher (OIDC)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # Node 24 ships npm ≥ 11.5.1, which is required for Trusted Publisher OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ogabrielluiz'
          always-auth: true

      - run: npm --version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish to npm
        id: publish
        run: npm publish --provenance --access public

      - name: Dump npm debug logs on failure
        if: failure() && steps.publish.outcome == 'failure'
        run: |
          echo "=== npm debug logs ==="
          for log in ~/.npm/_logs/*.log; do
            echo "--- $log ---"
            cat "$log"
            echo ""
          done
          echo "=== end logs ==="
