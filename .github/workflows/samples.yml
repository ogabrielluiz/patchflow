name: Regenerate samples

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/generate-samples.ts'
      - '.github/workflows/samples.yml'

# Prevent concurrent runs, and skip commits made by this workflow itself
concurrency:
  group: samples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    # Skip if the commit was made by this workflow (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip samples]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or the default token with write perms (configured above)
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Regenerate samples
        run: bun run samples

      - name: Commit changes if samples differ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet samples/; then
            echo "No sample changes — skipping commit."
          else
            git add samples/
            git commit -m "chore: regenerate samples [skip samples]"
            # Retry push with rebase in case main moved while we were building
            for i in 1 2 3; do
              if git push; then
                echo "Pushed samples on attempt $i"
                exit 0
              fi
              echo "Push rejected — pulling with rebase and retrying ($i/3)"
              git pull --rebase origin main
            done
            echo "Failed to push after 3 retries"
            exit 1
          fi
